version: "1.0"

instrumentation:
  enabled: true
  logging: "on"

  instrument_patterns:
    - pattern: ".*"
      enabled: true

  ignore_patterns:
    - pattern: "^health"

  http_filtering:
    enabled: true
    ignore_routes:
      - pattern: "^/health$"
      - pattern: "^/metrics$"

effect:
  auto_extract_metadata: true
  auto_instrumentation:
    enabled: true
    granularity: fiber
    span_naming:
      default: "effect-app-example.{function}"
      infer_from_source: true
      rules: []
    filter:
      include: []
      exclude: []
    performance:
      sampling_rate: 1.0
      min_duration: "0ms"
      max_concurrent: 0
    metadata:
      fiber_info: true
      source_location: true
      parent_fiber: true
  exporter_config:
    type: otlp                   
    endpoint: "http://localhost:4319"
    headers:
      x-api-key: atrim_internal_tenant_000000000002
      
    # Uncomment next lines for console debugging for exporter
    # type: console                 # Use console exporter for development
    # processor: simple             # Immediate export for debugging
